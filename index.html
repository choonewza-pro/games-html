<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-2xl w-full">
    <h1 class="text-5xl font-extrabold text-center text-white mb-2 drop-shadow-lg">🎮 Game Menu</h1>
    <p class="text-center text-purple-200 mb-10 text-lg">เลือกเกมที่คุณต้องการเล่น</p>

    <div class="grid gap-6">
      <a href="games/ar_balloon_burst_game_v1.html"
         class="block p-8 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 shadow-xl hover:bg-white/20 hover:scale-[1.02] transition-all duration-300">
        <h2 class="text-2xl font-bold text-white">🎈 Balloon Burst v1</h2>
        <p class="text-purple-200 mt-2">คำประวิสรรชนีย์ และคำไม่ประวิสรรชนีย์ Challenge — ใช้มือเป่าลูกโป่งกับกล้อง</p>
      </a>

      <a href="games/ar_balloon_burst_game_v2.html"
         class="block p-8 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 shadow-xl hover:bg-white/20 hover:scale-[1.02] transition-all duration-300">
        <h2 class="text-2xl font-bold text-white">🎈 Balloon Burst v2</h2>
        <p class="text-purple-200 mt-2">Online Multiplayer Challenge — เป่าลูกโป่งออนไลน์กับเพื่อน</p>
      </a>
    </div>
  </div>
</body>
</html>
