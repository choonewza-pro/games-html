<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 min-h-screen">
  <div class="min-h-screen flex flex-col items-center justify-center p-6">
    <h1 class="text-5xl font-extrabold text-center text-white mb-2 drop-shadow-lg">Game Menu</h1>
    <p class="text-center text-purple-200 mb-10 text-lg">เลือกเกมที่คุณต้องการเล่น</p>

    <div id="game-list" class="grid gap-6 w-full max-w-2xl">
      <div class="text-center text-purple-300 text-xl">กำลังโหลดเกม...</div>
    </div>
  </div>

  <script>
    async function loadGames() {
      const container = document.getElementById('game-list');
      try {
        const res = await fetch('https://api.github.com/repos/choonewza-pro/games-html/contents/games');
        if (!res.ok) throw new Error('API error');
        const items = await res.json();
        
        // Filter for HTML files (excluding index.html) and subdirectories
        const gamesList = items.filter(item => 
          (item.type === 'file' && item.name.endsWith('.html') && item.name !== 'index.html') ||
          (item.type === 'dir')
        );

        if (gamesList.length === 0) {
          container.innerHTML = '<div class="text-center text-purple-300 text-xl">ไม่มีเกมในขณะนี้</div>';
          return;
        }

        const cards = await Promise.all(gamesList.map(async (item) => {
          let title = item.name.replace(/\.html$/, '').replace(/[-_]/g, ' ');
          let gamePath = item.path;
          let downloadUrl = item.download_url;

          if (item.type === 'dir') {
            gamePath = `${item.path}/index.html`;
            downloadUrl = `https://raw.githubusercontent.com/choonewza-pro/games-html/main/${item.path}/index.html`;
          }

          try {
            const fileRes = await fetch(downloadUrl);
            const text = await fileRes.text();
            const match = text.match(/<title>([^<]+)<\/title>/);
            if (match) title = match[1];
          } catch {}

          const emoji = title.toLowerCase().includes('v2') || title.toLowerCase().includes('v3') ? '🎮' : '🎈';
          return `
            <a href="${gamePath}"
               class="block p-8 bg-white/10 backdrop-blur-md rounded-2xl border border-white/20 shadow-xl hover:bg-white/20 hover:scale-[1.02] transition-all duration-300">
              <h2 class="text-2xl font-bold text-white">${emoji} ${title}</h2>
              <p class="text-purple-200 mt-2">${gamePath}</p>
            </a>
          `;
        }));

        container.innerHTML = cards.join('');
      } catch (err) {
        container.innerHTML = '<div class="text-center text-purple-300 text-xl">ไม่สามารถโหลดรายชื่อเกมได้</div>';
      }
    }
    loadGames();
  </script>
</body>
</html>
